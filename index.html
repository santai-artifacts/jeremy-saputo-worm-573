<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-top: 20px;
        }

        canvas {
            border: 3px solid #333;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #score {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        #gameOver {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            display: none;
        }

        .controls {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐛 Worm</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="score">Score: 0</div>
        <div id="gameOver">GAME OVER! Press Space to restart</div>
        <div class="controls">
            <p>Use arrow keys or WASD to move</p>
            <p>Eat the pink food to grow!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverDisplay = document.getElementById('gameOver');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 5, y: 5 },
            { x: 4, y: 5 },
            { x: 3, y: 5 }
        ];

        let food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameOver = false;

        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key === ' ' && gameOver) {
                resetGame();
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function resetGame() {
            snake = [
                { x: 5, y: 5 },
                { x: 4, y: 5 },
                { x: 3, y: 5 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            scoreDisplay.textContent = 'Score: 0';
            gameOverDisplay.style.display = 'none';
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        function handleInput() {
            if (keys['arrowup'] || keys['w']) {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            }
            if (keys['arrowdown'] || keys['s']) {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            }
            if (keys['arrowleft'] || keys['a']) {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            }
            if (keys['arrowright'] || keys['d']) {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            }
        }

        function update() {
            if (gameOver) return;

            handleInput();
            direction = nextDirection;

            const head = snake[0];
            const newHead = {
                x: (head.x + direction.x + tileCount) % tileCount,
                y: (head.y + direction.y + tileCount) % tileCount
            };

            for (let segment of snake) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    gameOver = true;
                    gameOverDisplay.style.display = 'block';
                    return;
                }
            }

            snake.unshift(newHead);

            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreDisplay.textContent = `Score: ${score}`;
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            const x = food.x * gridSize;
            const y = food.y * gridSize;

            // Pink food
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
        }

        function drawSnake() {
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;

                if (i === 0) {
                    // Head
                    ctx.fillStyle = '#ff1493';
                    ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);

                    // Eyes
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;

                    if (direction.x === 1) {
                        // Looking right
                        ctx.fillRect(x + eyeOffset + 5, y + 5, eyeSize, eyeSize);
                        ctx.fillRect(x + eyeOffset + 5, y + 12, eyeSize, eyeSize);
                    } else if (direction.x === -1) {
                        // Looking left
                        ctx.fillRect(x + 5, y + 5, eyeSize, eyeSize);
                        ctx.fillRect(x + 5, y + 12, eyeSize, eyeSize);
                    } else if (direction.y === -1) {
                        // Looking up
                        ctx.fillRect(x + 5, y + 5, eyeSize, eyeSize);
                        ctx.fillRect(x + 12, y + 5, eyeSize, eyeSize);
                    } else if (direction.y === 1) {
                        // Looking down
                        ctx.fillRect(x + 5, y + 12, eyeSize, eyeSize);
                        ctx.fillRect(x + 12, y + 12, eyeSize, eyeSize);
                    }

                    // Pupils
                    ctx.fillStyle = '#000';
                    const pupilSize = 1.5;
                    if (direction.x === 1) {
                        ctx.fillRect(x + eyeOffset + 6, y + 6, pupilSize, pupilSize);
                        ctx.fillRect(x + eyeOffset + 6, y + 13, pupilSize, pupilSize);
                    } else if (direction.x === -1) {
                        ctx.fillRect(x + 6, y + 6, pupilSize, pupilSize);
                        ctx.fillRect(x + 6, y + 13, pupilSize, pupilSize);
                    } else if (direction.y === -1) {
                        ctx.fillRect(x + 6, y + 6, pupilSize, pupilSize);
                        ctx.fillRect(x + 13, y + 6, pupilSize, pupilSize);
                    } else if (direction.y === 1) {
                        ctx.fillRect(x + 6, y + 13, pupilSize, pupilSize);
                        ctx.fillRect(x + 13, y + 13, pupilSize, pupilSize);
                    }

                    // Tongue
                    ctx.strokeStyle = '#ff69b4';
                    ctx.lineWidth = 2;
                    const tongueLength = 8;
                    const tongueX = x + gridSize / 2;
                    const tongueY = y + gridSize / 2;

                    ctx.beginPath();
                    if (direction.x === 1) {
                        ctx.moveTo(tongueX + 8, tongueY - 2);
                        ctx.lineTo(tongueX + 12, tongueY - 2);
                        ctx.moveTo(tongueX + 8, tongueY + 2);
                        ctx.lineTo(tongueX + 12, tongueY + 2);
                    } else if (direction.x === -1) {
                        ctx.moveTo(tongueX - 8, tongueY - 2);
                        ctx.lineTo(tongueX - 12, tongueY - 2);
                        ctx.moveTo(tongueX - 8, tongueY + 2);
                        ctx.lineTo(tongueX - 12, tongueY + 2);
                    } else if (direction.y === -1) {
                        ctx.moveTo(tongueX - 2, tongueY - 8);
                        ctx.lineTo(tongueX - 2, tongueY - 12);
                        ctx.moveTo(tongueX + 2, tongueY - 8);
                        ctx.lineTo(tongueX + 2, tongueY - 12);
                    } else if (direction.y === 1) {
                        ctx.moveTo(tongueX - 2, tongueY + 8);
                        ctx.lineTo(tongueX - 2, tongueY + 12);
                        ctx.moveTo(tongueX + 2, tongueY + 8);
                        ctx.lineTo(tongueX + 2, tongueY + 12);
                    }
                    ctx.stroke();

                } else if (i === snake.length - 1) {
                    // Tail - triangle
                    ctx.fillStyle = '#ff1493';
                    ctx.beginPath();

                    if (direction.x === 1) {
                        ctx.moveTo(x + gridSize, y + gridSize / 2);
                        ctx.lineTo(x, y);
                        ctx.lineTo(x, y + gridSize);
                    } else if (direction.x === -1) {
                        ctx.moveTo(x, y + gridSize / 2);
                        ctx.lineTo(x + gridSize, y);
                        ctx.lineTo(x + gridSize, y + gridSize);
                    } else if (direction.y === -1) {
                        ctx.moveTo(x + gridSize / 2, y);
                        ctx.lineTo(x, y + gridSize);
                        ctx.lineTo(x + gridSize, y + gridSize);
                    } else if (direction.y === 1) {
                        ctx.moveTo(x + gridSize / 2, y + gridSize);
                        ctx.lineTo(x, y);
                        ctx.lineTo(x + gridSize, y);
                    }

                    ctx.closePath();
                    ctx.fill();

                } else {
                    // Body segments
                    ctx.fillStyle = '#ff1493';
                    ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                }
            }
        }

        function draw() {
            // Red background
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawFood();
            drawSnake();
        }

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100);
        }

        gameLoop();
    </script>
</body>
</html>
