<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .game-wrapper {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .game-board {
            width: 400px;
            height: 400px;
            background: #1a1a2e;
            border: 3px solid white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cell {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        .snake {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            box-shadow: 0 0 5px rgba(0, 212, 255, 0.6);
        }

        .snake.head {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
            z-index: 2;
        }

        .food {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.8), inset 0 0 5px rgba(255, 200, 200, 0.5);
            animation: pulse 0.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .score-display {
            text-align: center;
        }

        .score-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .game-status {
            text-align: center;
            font-size: 1rem;
            color: #333;
            min-height: 1.5rem;
        }

        .game-status.game-over {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 1.5rem;
            color: white;
            max-width: 500px;
            text-align: center;
        }

        .instructions h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .instructions p {
            margin-bottom: 0.75rem;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .game-board {
                width: 300px;
                height: 300px;
            }

            .cell {
                width: 15px;
                height: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .info-panel {
                min-width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE</h1>

        <div class="game-wrapper">
            <div class="game-board" id="gameBoard"></div>

            <div class="info-panel">
                <div class="score-display">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>

                <div class="game-status" id="status"></div>

                <div class="controls">
                    <button class="button btn-start" id="startBtn">Start Game</button>
                    <button class="button btn-reset" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Play</h3>
            <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move the snake</p>
            <p>Eat the red food to grow and earn points</p>
            <p>Don't hit the walls or yourself!</p>
        </div>
    </div>

    <script>
        const GRID_SIZE = 20;
        const BOARD_WIDTH = 20;
        const BOARD_HEIGHT = 20;
        const INITIAL_SPEED = 100;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameActive = false;
        let gameLoop = null;
        let speed = INITIAL_SPEED;

        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function spawnFood() {
            let newFood;
            let isOnSnake;
            do {
                isOnSnake = false;
                newFood = {
                    x: Math.floor(Math.random() * BOARD_WIDTH),
                    y: Math.floor(Math.random() * BOARD_HEIGHT)
                };

                for (let segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        isOnSnake = true;
                        break;
                    }
                }
            } while (isOnSnake);

            food = newFood;
        }

        function render() {
            gameBoard.innerHTML = '';

            // Render food
            const foodEl = document.createElement('div');
            foodEl.className = 'cell food';
            foodEl.style.left = food.x * GRID_SIZE + 'px';
            foodEl.style.top = food.y * GRID_SIZE + 'px';
            gameBoard.appendChild(foodEl);

            // Render snake
            snake.forEach((segment, index) => {
                const segmentEl = document.createElement('div');
                segmentEl.className = 'cell snake' + (index === 0 ? ' head' : '');
                segmentEl.style.left = segment.x * GRID_SIZE + 'px';
                segmentEl.style.top = segment.y * GRID_SIZE + 'px';
                gameBoard.appendChild(segmentEl);
            });
        }

        function update() {
            direction = nextDirection;

            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= BOARD_WIDTH ||
                newHead.y < 0 || newHead.y >= BOARD_HEIGHT) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                spawnFood();

                // Increase speed slightly
                if (speed > 50) speed -= 2;
            } else {
                snake.pop();
            }

            render();
        }

        function startGame() {
            if (gameActive) return;

            gameActive = true;
            startBtn.textContent = 'Pause';
            statusDisplay.textContent = 'Playing...';
            statusDisplay.classList.remove('game-over');

            gameLoop = setInterval(update, speed);
        }

        function pauseGame() {
            if (!gameActive) return;

            gameActive = false;
            startBtn.textContent = 'Resume';
            statusDisplay.textContent = 'Paused';
            clearInterval(gameLoop);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameLoop);
            startBtn.textContent = 'Start Game';
            statusDisplay.textContent = `Game Over! Final Score: ${score}`;
            statusDisplay.classList.add('game-over');
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            speed = INITIAL_SPEED;
            gameActive = false;

            scoreDisplay.textContent = '0';
            startBtn.textContent = 'Start Game';
            statusDisplay.textContent = '';
            statusDisplay.classList.remove('game-over');

            clearInterval(gameLoop);
            spawnFood();
            render();
        }

        function handleKeyPress(e) {
            if (!gameActive && (e.code.startsWith('Arrow') || 'WASDwasd'.includes(e.key))) {
                startGame();
                return;
            }

            let newDir = null;

            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    newDir = {x: 0, y: -1};
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    newDir = {x: 0, y: 1};
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    newDir = {x: -1, y: 0};
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    newDir = {x: 1, y: 0};
                    break;
            }

            if (newDir) {
                // Prevent 180-degree turns
                if (!(direction.x === -newDir.x && direction.y === -newDir.y)) {
                    nextDirection = newDir;
                }
                e.preventDefault();
            }
        }

        startBtn.addEventListener('click', () => {
            if (gameActive) {
                pauseGame();
            } else {
                startGame();
            }
        });

        resetBtn.addEventListener('click', resetGame);

        document.addEventListener('keydown', handleKeyPress);

        // Initialize
        spawnFood();
        render();
    </script>
</body>
</html>
